swagger: "2.0"
info:
  title: ChannelShipper Royal Mail Label API
  description: API for creating Royal Mail shipping labels and downloading them.
  version: 1.0.0

host: rm-api-f2ir.onrender.com
schemes:
  - https

basePath: /api/v1

produces:
  - application/json
consumes:
  - application/json

paths:

  /orders:
    post:
      tags:
        - Orders
      summary: Create order and generate label
      description: Create a shipping order and generate Royal Mail label.
      operationId: CreateOrders
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          required: true
          description: Order information
          schema:
            $ref: '#/definitions/CreateOrdersRequest'
          example:
            items:
              - orderReference: "ORDER123"
                recipient:
                  address:
                    fullName: "John Smith"
                    addressLine1: "10 Downing Street"
                    city: "London"
                    postcode: "SW1A2AA"
                    countryCode: "GB"
                packages:
                  - weightInGrams: 500
                    packageFormatIdentifier: "smallParcel"
                orderDate: "2026-03-01T10:00:00Z"
                subtotal: 10
                shippingCostCharged: 3
                total: 13
      responses:
        "200":
          description: Order created successfully
          schema:
            $ref: '#/definitions/CreateOrdersResponse'

  /orders/{orderIdentifiers}:
    delete:
      tags:
        - Orders
      summary: Delete order
      description: Delete an order. Labels generated for deleted orders become invalid.
      operationId: DeleteOrders
      security:
        - Bearer: []
      parameters:
        - name: orderIdentifiers
          in: path
          required: true
          type: string
          description: Order identifier
          example: 12345
      responses:
        "200":
          description: Order deleted successfully

  /orders/{orderIdentifiers}/label:
    get:
      tags:
        - Labels
      summary: Download label
      description: Download shipping label PDF.
      operationId: GetLabel
      security:
        - Bearer: []
      parameters:
        - name: orderIdentifiers
          in: path
          required: true
          type: string
          example: 12345
        - name: documentType
          in: query
          type: string
          default: postageLabel
      produces:
        - application/pdf
      responses:
        "200":
          description: PDF label
          schema:
            type: file

tags:
  - name: Orders
  - name: Labels

definitions:

  CreateOrdersRequest:
    type: object
    required:
      - items
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/CreateOrderRequest'

  CreateOrderRequest:
    type: object
    required:
      - recipient
      - orderDate
      - subtotal
      - shippingCostCharged
      - total
    properties:
      orderReference:
        type: string
      recipient:
        $ref: '#/definitions/Recipient'
      packages:
        type: array
        items:
          $ref: '#/definitions/Package'
      orderDate:
        type: string
        format: date-time
      subtotal:
        type: number
      shippingCostCharged:
        type: number
      total:
        type: number

  Recipient:
    type: object
    properties:
      address:
        $ref: '#/definitions/Address'

  Address:
    type: object
    required:
      - addressLine1
      - city
      - countryCode
    properties:
      fullName:
        type: string
      addressLine1:
        type: string
      city:
        type: string
      postcode:
        type: string
      countryCode:
        type: string

  Package:
    type: object
    required:
      - weightInGrams
      - packageFormatIdentifier
    properties:
      weightInGrams:
        type: integer
      packageFormatIdentifier:
        type: string

  CreateOrdersResponse:
    type: object
    properties:
      successCount:
        type: integer
      createdOrders:
        type: array
        items:
          $ref: '#/definitions/CreateOrderResponse'

  CreateOrderResponse:
    type: object
    properties:
      orderIdentifier:
        type: integer
      trackingNumber:
        type: string
      label:
        type: string
        description: Base64 encoded PDF label

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: "Authorization header using Bearer token. Example: Bearer YOUR_TOKEN"
